name: Build and Release go-nav

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发工作流

permissions:
  contents: write # 必须配置 write 权限，才能自动创建 Release 和上传附件

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 下载构建：拉取代码与配置 Bun 环境
        run: |
          # 拉取目标仓库代码
          git clone https://github.com/dengxiwang/go-nav.git
          cd go-nav

          # 下载 Bun 的 Linux x64 压缩包
          wget https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64.zip
          
          # 解压并提取 bun 可执行文件到 go-nav 根目录
          unzip bun-linux-x64.zip
          mv bun-linux-x64/bun ./bun
          chmod +x ./bun
          
          # 清理临时下载的文件
          rm -rf bun-linux-x64 bun-linux-x64.zip

      - name: 2. 下载构建：安装依赖与打包
        run: |
          cd go-nav
          # 使用提取的 bun 进行安装和构建
          ./bun install
          ./bun run build:server

      - name: 3. 进行打包：整理 standalone 目录并压缩
        run: |
          cd go-nav
          
          # 复制并重命名环境变量文件
          cp .env.example .next/standalone/.env.local
          
          # 将 bun 放入 standalone 目录
          cp bun .next/standalone/
          
          # 进入 standalone 目录进行压缩
          cd .next/standalone
          # 将所有内容压缩为 gonav-linux_64.tar.gz，并将其保存到 GitHub 工作区的根目录
          tar -czvf $GITHUB_WORKSPACE/gonav-linux_64.tar.gz .

      - name: 4. 推送前准备：提取应用版本号
        id: get_version
        run: |
          cd go-nav
          # 从 package.json 中匹配包含 "version" 的行，并提取冒号后面的值（例如 1.3.2）
          VERSION=$(grep '"version"' package.json | head -1 | awk -F '"' '{print $4}')
          echo "提取到的版本号为: $VERSION"
          
          # 将版本号写入 GITHUB_OUTPUT 供下一步使用
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 5. 推送：创建 Release 并上传压缩包
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }} # 版本名称，例如 v1.3.2
          name: v${{ steps.get_version.outputs.version }}
          files: gonav-linux_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
