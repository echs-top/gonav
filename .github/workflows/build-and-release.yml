name: Build and Release go-nav

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发工作流
  schedule:
    # 每天北京时间 00:00 触发 (对应 UTC 时间的 16:00)
    - cron: '0 16 * * *'

permissions:
  contents: write # 必须配置 write 权限，才能自动创建 Release 和上传附件

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: 0. 检查版本更新
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 从目标仓库读取 package.json，并提取 version 字段
          REMOTE_VERSION=$(curl -s https://raw.githubusercontent.com/dengxiwang/go-nav/refs/heads/main/package.json | grep '"version"' | head -1 | awk -F '"' '{print $4}')
          
          # 容错处理：确保成功获取到了远程版本号
          if [ -z "$REMOTE_VERSION" ]; then
            echo "错误：无法获取远程目标仓库的版本号"
            exit 1
          fi
          echo "目标仓库最新版本号为: $REMOTE_VERSION"
          
          # 2. 获取你当前仓库最新发布的 Release tag
          LATEST_RELEASE=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName 2>/dev/null || echo "")
          echo "当前仓库最新 Release 为: $LATEST_RELEASE"
          
          # 3. 将 tag 前面的 'v' 前缀去掉以进行纯数字版本对比
          LATEST_VERSION=${LATEST_RELEASE#v}
          
          # 4. 判断是否需要更新
          if [ "$REMOTE_VERSION" == "$LATEST_VERSION" ]; then
            echo "已是最新版本 ($REMOTE_VERSION)，跳过后续构建步骤。"
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "发现新版本 ($REMOTE_VERSION)，准备开始构建..."
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "version=$REMOTE_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: 1. 下载构建：拉取代码与配置 Bun 环境
        if: steps.check.outputs.has_update == 'true'
        run: |
          # 拉取目标仓库代码
          git clone https://github.com/dengxiwang/go-nav.git
          cd go-nav

          # 下载 Bun 的 Linux x64 压缩包
          wget https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64.zip
          
          # 解压并提取 bun 可执行文件到 go-nav 根目录
          unzip bun-linux-x64.zip
          mv bun-linux-x64/bun ./bun
          chmod +x ./bun
          
          # 清理临时下载的文件
          rm -rf bun-linux-x64 bun-linux-x64.zip

      - name: 2. 下载构建：安装依赖与打包
        if: steps.check.outputs.has_update == 'true'
        run: |
          cd go-nav
          # 使用提取的 bun 进行安装和构建
          ./bun install
          ./bun run build:server

      - name: 3. 进行打包：整理 standalone 目录并多格式压缩
        if: steps.check.outputs.has_update == 'true'
        run: |
          cd go-nav
          
          # 复制并重命名环境变量文件
          cp .env.example .next/standalone/.env.local
          
          # 将 bun 放入 standalone 目录
          cp bun .next/standalone/
          
          # 进入 standalone 目录进行压缩
          cd .next/standalone
          
          # 1. 打包为常规的 tar.gz
          tar -czvf $GITHUB_WORKSPACE/gonav-linux_64.tar.gz .
          
          # 2. 打包为 tar.zst (现代高效率压缩，解压速度极快)
          tar --zstd -cvf $GITHUB_WORKSPACE/gonav-linux_64.tar.zst .
          
          # 3. 打包为 tar.xz (极限高压缩比，体积最小)
          tar -cJvf $GITHUB_WORKSPACE/gonav-linux_64.tar.xz .

      - name: 4. 推送：创建 Release 并上传多个压缩包
        if: steps.check.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.version }}
          name: v${{ steps.check.outputs.version }}
          files: |
            gonav-linux_64.tar.gz
            gonav-linux_64.tar.zst
            gonav-linux_64.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
